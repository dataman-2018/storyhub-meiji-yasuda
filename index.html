<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoryHub × 明治安田</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d1117;
    --ink-2: #2d3748;
    --ink-3: #718096;
    --paper: #f7f8fa;
    --card: #ffffff;
    --yellow: #fabf00;
    --yellow-light: #fef9e7;
    --teal: #00a08e;
    --teal-light: #e6f7f5;
    --navy: #1a2744;
    --rule: rgba(13,17,23,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }
  .logo {
    font-family: "DM Serif Display", serif;
    font-size: 18px;
    color: rgba(247,248,250,0.5);
    letter-spacing: 0.02em;
    margin-bottom: 48px;
  }
  h1 {
    font-family: "DM Serif Display", serif;
    font-size: clamp(28px, 4vw, 44px);
    line-height: 1.25;
    text-align: center;
    max-width: 560px;
    margin-bottom: 16px;
    font-weight: 400;
  }
  h1 em { font-style: italic; color: var(--yellow); }
  .sub {
    font-size: 14px;
    color: rgba(247,248,250,0.5);
    text-align: center;
    max-width: 420px;
    line-height: 1.8;
    margin-bottom: 56px;
  }
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 56px;
  }
  .cards a {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
  }
  .cards a:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.16);
  }
  .card-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(247,248,250,0.35);
    margin-bottom: 10px;
  }
  .card-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--paper);
  }
  .meta {
    font-size: 12px;
    color: rgba(247,248,250,0.25);
    text-align: center;
    line-height: 1.8;
  }
  @media (max-width: 480px) {
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="logo">StoryHub</div>
  <h1>保険の価値を、<br>ストーリーで<em>届ける。</em></h1>
  <p class="sub">明治安田様向けご提案資料です。<br>以下からご覧ください。</p>
  <div class="cards">
    <a href="/about">
      <div class="card-label">About StoryHub</div>
      <div class="card-name">StoryHubとは？</div>
    </a>
    <a href="/lp">
      <div class="card-label">Landing Page</div>
      <div class="card-name">縦スクロール版</div>
    </a>
    <a href="/deck">
      <div class="card-label">Proposal Deck</div>
      <div class="card-name">横長提案書</div>
    </a>
    <a href="/research">
      <div class="card-label">Research Report</div>
      <div class="card-name">リサーチ報告書</div>
    </a>
  </div>
  <div class="meta">StoryHub株式会社<br>本資料は商談用非公開資料です</div>
</body>
</html>
